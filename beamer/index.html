<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beamer · WebAssembly</title>
<!-- Cross-origin isolation (wasm threads) on hosts without COOP/COEP headers,
     e.g. GitHub Pages. Reloads once on first visit. Classic script (not module). -->
<script src="coi-serviceworker.js"></script>
<style>
  :root { --fg:#e8eef4; --dim:#7d8893; --line:#2a3138; --accent:#cfe6ff; --bg:#06090d; --ok:#cfe6ff; --err:#ff7b7b; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:13px/1.5 ui-monospace,"SF Mono",Menlo,Consolas,monospace; letter-spacing:.02em; }
  .wrap { max-width:920px; margin:0 auto; padding:28px 20px 60px; }
  h1 { font-size:13px; font-weight:600; letter-spacing:.35em; margin:0 0 2px; text-transform:uppercase; }
  .sub { color:var(--dim); margin:0 0 22px; }
  .row { display:flex; flex-wrap:wrap; gap:14px; align-items:center; }
  label { color:var(--dim); text-transform:uppercase; font-size:11px; letter-spacing:.18em; }
  select, button { background:#0b0f14; color:var(--fg); border:1px solid var(--line); font:inherit; padding:7px 10px; outline:none; }
  button { cursor:pointer; text-transform:uppercase; letter-spacing:.14em; padding:8px 18px; }
  button:hover:not(:disabled) { background:#141b22; border-color:#5b6b7a; }
  button:disabled { opacity:.4; cursor:default; }
  .chk { display:flex; gap:7px; align-items:center; color:var(--fg); text-transform:none; letter-spacing:0; }
  #status { color:var(--dim); margin:14px 0 0; min-height:1.5em; }
  .ok { color:var(--ok); } .err { color:var(--err); }
  pre { background:#0a0e12; border:1px solid var(--line); padding:12px; max-height:340px; overflow:auto; color:#c7d2dc; margin:14px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Beamer</h1>
  <p class="sub">Starlink beam allocation, solved in your browser — the production Rust solver compiled to WebAssembly.</p>
  <div class="row">
    <label for="scenario">Scenario</label>
    <select id="scenario"></select>
    <label class="chk"><input type="checkbox" id="intense"> maximum-coverage</label>
    <button id="solve" disabled>Solve</button>
  </div>
  <div id="status">initializing…</div>
  <pre id="out" hidden></pre>
</div>
<script src="index.js"></script>
</body>
</html>
