name: Deploy to GitHub Pages

# Builds both WASM modules (serial viz render + threaded solver) and publishes
# the assembled site: the visualizer at `/`, the solver harness at `/solver`.
#
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish (don't cancel a deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stable builds the serial viz render module; nightly + rust-src builds the
      # threaded solver with -Z build-std (atomics / shared memory).
      - name: Install Rust toolchains
        run: |
          rustup toolchain install stable  --profile minimal --target wasm32-unknown-unknown
          rustup toolchain install nightly --profile minimal --component rust-src --target wasm32-unknown-unknown

      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      # Prebuilt CLI matching the wasm-bindgen crate version in Cargo.lock.
      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.125

      - name: Build WASM + assemble site
        run: bash web/dist.sh

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
