<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Beamer · WebAssembly</title>
<style>
  html, body { margin: 0; height: 100%; background: #06090d; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  #msg {
    position: fixed; inset: 0; display: grid; place-items: center; pointer-events: none;
    color: #7d8893; font: 12px/1.5 ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: .15em; text-transform: uppercase; text-align: center; padding: 2rem;
  }
  #msg.err { color: #ff7b7b; }
</style>
</head>
<body>
  <canvas id="beamer"></canvas>
  <div id="msg">loading beamer…</div>
<script type="module">
const msg = document.getElementById('msg');
const v = Date.now();

// The solve runs off the render thread (the 100k solve is ~32s). This worker
// runs the serial solver and returns the result serialized; window.solveText is
// what the viz wasm calls (the `solveText` import). Define it BEFORE start().
const solveWorker = new Worker('./viz-solve-worker.js?v=' + v, { type: 'module' });
let solveSeq = 0;
const solvePending = new Map();
solveWorker.onmessage = ({ data }) => {
  if (data.type === 'ready') { window.__vizSolveMode = data; return; } // {threaded, workers}
  const p = solvePending.get(data.id);
  if (!p) return;
  solvePending.delete(data.id);
  if (data.error) p.reject(new Error(data.error));
  else { window.__vizLastSolve = { ms: data.ms, threaded: data.threaded, workers: data.workers }; p.resolve(data.bytes); }
};
window.solveText = (text, algo) => new Promise((resolve, reject) => {
  const id = ++solveSeq;
  solvePending.set(id, { resolve, reject });
  solveWorker.postMessage({ id, text, algo });
});

try {
  // Cache-bust both the JS glue and the wasm so a rebuild is always picked up.
  const mod = await import('./viz-pkg/beam_planner.js?v=' + v);
  await mod.default({ module_or_path: './viz-pkg/beam_planner_bg.wasm?v=' + v });
  await mod.start(document.getElementById('beamer'));
  msg.remove(); // eframe owns the canvas now
} catch (e) {
  msg.classList.add('err');
  msg.textContent = 'Beamer failed to start: ' + ((e && e.message) || e);
  console.error(e);
}
</script>
</body>
</html>
