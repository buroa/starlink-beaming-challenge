# Defaults for building this app with wasm-pack.
[build]
target = "wasm32-unknown-unknown"

# Threaded build flags (see beamer/.cargo/config.toml). The single-thread build
# (`build:wasm-st`) clears RUSTFLAGS to opt out and link the plain std.
[target.wasm32-unknown-unknown]
rustflags = [
  "-C", "target-feature=+atomics,+bulk-memory,+mutable-globals",
  "-C", "link-arg=--shared-memory",
  "-C", "link-arg=--import-memory",
  "-C", "link-arg=--max-memory=2147483648",
  "-C", "link-arg=--export=__heap_base",
  "-C", "link-arg=--export-if-defined=__wasm_init_tls",
  "-C", "link-arg=--export-if-defined=__tls_size",
  "-C", "link-arg=--export-if-defined=__tls_align",
  "-C", "link-arg=--export-if-defined=__tls_base",
]
